name: CI Pipeline

on:
  push:
    branches: ["main"]

jobs:

  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:

      - name: checkout repository
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: install dependencies
        run: npm install

      - name: generate prisma Client
        run: npx prisma generate

      - name: run tests
        run: npm test