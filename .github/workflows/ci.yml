name: CI Pipeline

on:
  push:
    branches: ["main"]

jobs:

  test:
    runs-on: ubuntu-latest

    steps:

      - name: checkout repository
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: install dependencies
        uses: npm install

      - name: run tests
        uses: npm test