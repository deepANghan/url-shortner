services:
  prometheus:
    image: prom/prometheus:latest
    ports: ["9090:9090"]
    volumes:
      - "./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml"
      - "./prometheus_data:/prometheus"
  
  grafana:
    image: grafana/grafana:latest
    ports: ["5000:3000"]
    volumes:
      - "./grafana_data:/var/lib/grafana"
    depends_on: 
      - prometheus
  
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    ports: ["9187:9187"]
    env_file:
      - .env
  
  promtail:
    image: grafana/promtail:latest
    volumes:
      - "./prometheus/promtail.yml:/etc/promtail/config.yml"
      - "../backend/server/logs/:/var/log/url-shortener"
    depends_on:
      - loki

  loki:
    image: grafana/loki:latest
    ports: ["3100:3100"]
    volumes:
      - "./loki_data:/loki"